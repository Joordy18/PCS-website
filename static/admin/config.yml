local_backend: true

backend:
  name: git-gateway
  branch: main

# Emplacement des médias uploadés
media_folder: "static/images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "news"
    label: "Actualités"
    folder: "content/news"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {label: "Titre", name: "title", widget: "string"}
      - {label: "Date de publication", name: "date", widget: "datetime"}
      - {label: "Image de couverture", name: "image", widget: "image", required: false}
      - {label: "Description / Résumé", name: "description", widget: "text", required: false}
      - {label: "Contenu", name: "body", widget: "markdown"}

  - name: "teams"
    label: "Équipes et Rosters"
    folder: "content/teams"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Nom du jeu", name: "title", widget: "string"}
      - {label: "Joueurs (Roster)", name: "players", widget: "list", required: false, fields: [
          {label: "Pseudo", name: "name", widget: "string"},
          {label: "Rôle / Poste", name: "role", widget: "string"},
          {label: "Photo", name: "image", widget: "image", required: false}
        ]}
      - {label: "Coaching Staff", name: "staff", widget: "list", required: false, fields: [
          {label: "Pseudo", name: "name", widget: "string"},
          {label: "Rôle / Poste", name: "role", widget: "string"},
          {label: "Photo", name: "image", widget: "image", required: false}
        ]}
      - {label: "Contenu Optionnel (ex: Stratégie globale)", name: "body", widget: "markdown", required: false}

  - name: "partenaires"
    label: "Partenaires"
    folder: "content/partenaires"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Nom du partenaire", name: "title", widget: "string"}
      - {label: "Logo", name: "image", widget: "image", required: false}
      - {label: "Catégorie", name: "category", widget: "select", options: ["Majeur", "Officiel", "Fournisseur", "Autre"]}
      - {label: "Lien site web", name: "link", widget: "string", required: false}
      - {label: "Afficher dans la banderole", name: "show_in_banner", widget: "boolean", default: true}
      - {label: "Description", name: "body", widget: "markdown", required: false}

  - name: "jobs"
    label: "Offres & Recrutement"
    folder: "content/recrutement"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Titre du poste / Offre", name: "title", widget: "string"}
      - {label: "Type de contrat", name: "contract_type", widget: "select", options: ["Stage", "Bénévolat", "CDD", "CDI", "Alternance"]}
      - {label: "Lieu", name: "location", widget: "string", default: "Télétravail"}
      - {label: "Date de début", name: "date", widget: "datetime", required: false}
      - {label: "Description détaillée de l'offre", name: "body", widget: "markdown"}

  - name: "shop"
    label: "Boutique"
    folder: "content/shop"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Nom du produit", name: "title", widget: "string"}
      - {label: "Photo de l'article", name: "image", widget: "image"}
      - {label: "Catégorie (Ex: Vêtement pro)", name: "category", widget: "string"}
      - {label: "Prix (Ex: 35.00 €)", name: "price", widget: "string"}
      - {label: "Lien vers la boutique HelloAsso", name: "link", widget: "string"}
      - {label: "Nouveau produit ?", name: "is_new", widget: "boolean", default: false}
