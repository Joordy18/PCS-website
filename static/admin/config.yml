local_backend: true

backend:
  name: git-gateway
  branch: master

# Emplacement des médias uploadés
media_folder: "static/images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "news"
    label: "Actualités"
    folder: "content/news"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {label: "Titre", name: "title", widget: "string"}
      - {label: "Date de publication", name: "date", widget: "datetime"}
      - {label: "Image de couverture", name: "image", widget: "image", required: false}
      - {label: "Description / Résumé", name: "description", widget: "text", required: false}
      - {label: "Contenu", name: "body", widget: "markdown"}
      - {label: "Activer les commentaires", name: "comments_enabled", widget: "boolean", default: true}

  - name: "teams"
    label: "Équipes et Rosters"
    folder: "content/teams"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Nom du jeu", name: "title", widget: "string"}
      - {label: "Image du jeu (Icône/Couverture)", name: "image", widget: "image", required: false}
      - label: "Équipes / Rosters"
        name: "rosters"
        widget: "list"
        fields:
          - {label: "Nom de l'équipe (ex: Équipe Principale, Académie)", name: "name", widget: "string", default: "Équipe Principale"}
          - {label: "Logo de l'équipe", name: "logo", widget: "image", required: false}
          - {label: "Afficher dans le slider d'accueil ?", name: "show_in_slider", widget: "boolean", default: true}
          - {label: "Description / Contenu (Texte/Images)", name: "content", widget: "markdown", required: false}
          - {label: "Joueurs (Roster)", name: "players", widget: "list", required: false, fields: [
              {label: "Pseudo", name: "name", widget: "string"},
              {label: "Rôle / Poste", name: "role", widget: "string"},
              {label: "Photo", name: "image", widget: "image", required: false}
            ]}
          - {label: "Coaching Staff", name: "staff", widget: "list", required: false, fields: [
              {label: "Pseudo", name: "name", widget: "string"},
              {label: "Rôle / Poste", name: "role", widget: "string"},
              {label: "Photo", name: "image", widget: "image", required: false}
            ]}
      - {label: "Contenu Global Optionnel (ex: Présentation du jeu)", name: "body", widget: "markdown", required: false}

  - name: "partenaires"
    label: "Partenaires"
    folder: "content/partenaires"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Nom du partenaire", name: "title", widget: "string"}
      - {label: "Logo", name: "image", widget: "image", required: false}
      - {label: "Catégorie", name: "category", widget: "select", options: ["Sponsor", "Majeur", "Officiel", "Fournisseur", "Partenaires RSE", "Autre"]}
      - {label: "Lien site web", name: "link", widget: "string", required: false}
      - {label: "Afficher dans la banderole", name: "show_in_banner", widget: "boolean", default: true}
      - {label: "Description", name: "body", widget: "markdown", required: false}

  - name: "jobs"
    label: "Offres & Recrutement"
    folder: "content/recrutement"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Titre du poste / Offre", name: "title", widget: "string"}
      - {label: "Type de contrat", name: "contract_type", widget: "select", options: ["Stage", "Bénévolat", "CDD", "CDI", "Alternance"]}
      - {label: "Lieu", name: "location", widget: "string", default: "Télétravail"}
      - {label: "Date de début", name: "date", widget: "datetime", required: false}
      - {label: "Description détaillée de l'offre", name: "body", widget: "markdown"}

  - name: "shop"
    label: "Boutique"
    folder: "content/shop"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Nom du produit", name: "title", widget: "string"}
      - {label: "Photo de l'article", name: "image", widget: "image"}
      - {label: "Catégorie (Ex: Vêtement pro)", name: "category", widget: "string"}
      - {label: "Prix (Ex: 35.00 €)", name: "price", widget: "string"}
      - {label: "Lien vers la boutique HelloAsso", name: "link", widget: "string"}
      - {label: "Nouveau produit ?", name: "is_new", widget: "boolean", default: false}

  - name: "settings"
    label: "Paramètres du site"
    files:

      - name: "hero"
        label: "Carrousel Hero (accueil)"
        file: "content/_index.md"
        fields:
          - label: "Images du carrousel"
            name: "heroImages"
            widget: "list"
            label_singular: "Image"
            fields:
              - {label: "Image", name: "src", widget: "image"}
              - {label: "Description (alt)", name: "alt", widget: "string"}

      - name: "palmares"
        label: "Palmarès (accomplissements)"
        file: "content/teams/_index.md"
        fields:
          - label: "Accomplissements"
            name: "accomplishments"
            widget: "list"
            label_singular: "Accomplissement"
            fields:
              - {label: "Jeu", name: "game", widget: "string"}
              - {label: "Classement (ex: Top 1)", name: "rank", widget: "string"}
              - label: "Couleur du classement"
                name: "rankClass"
                widget: "select"
                options:
                  - {label: "Or (Top 1 / Champion)", value: "gold"}
                  - {label: "Argent (Top 2)", value: "silver"}
                  - {label: "Bronze (Top 3)", value: "bronze"}
                  - {label: "Bleu (Top 4+)", value: "blue"}
              - {label: "Tournoi / Compétition", name: "tournament", widget: "string"}
              - {label: "Équipe / Joueur", name: "team", widget: "string"}
              - {label: "Année", name: "year", widget: "number", value_type: "int"}

          - label: "Ex-Talents"
            name: "exTalents"
            widget: "list"
            label_singular: "Talent"
            fields:
              - {label: "Nom", name: "name", widget: "string"}
              - {label: "Photo", name: "image", widget: "image"}

          - label: "Équipe Mise en Avant (Banner)"
            name: "featuredTeam"
            widget: "object"
            fields:
              - {label: "Image", name: "image", widget: "image"}
              - {label: "Description (alt)", name: "alt", widget: "string"}
              - {label: "Badge (ex: Champion)", name: "badge", widget: "string"}
              - {label: "Titre", name: "title", widget: "string"}
              - {label: "Joueurs", name: "players", widget: "string"}


