{{ define "main" }}
<div class="bg-black min-h-screen text-white pt-20 pb-20">
  
  <!-- HERO SECTION -->
  <section class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 mb-16 text-center py-16 relative">
    <a href="/teams/" class="absolute left-4 top-4 text-gray-400 hover:text-white flex items-center gap-2 transition-colors">
      <i data-lucide="arrow-left" class="w-5 h-5"></i>
      <span class="font-bold">Retour aux équipes</span>
    </a>
    <h1 class="text-6xl md:text-7xl font-black mb-6 uppercase tracking-tight" data-aos="fade-up">{{ .Title }}</h1>
    <div class="h-2 w-24 bg-red-600 mx-auto" data-aos="fade-up" data-aos-delay="100"></div>
  </section>

  <!-- PLAYERS SECTION -->
  {{ if .Params.players }}
  <section class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 mb-20" data-aos="fade-up" data-aos-delay="200">
    <h2 class="text-3xl font-black mb-10 text-center uppercase tracking-wider flex justify-center items-center gap-4">
      Roster <span class="text-red-600">Actuel</span>
    </h2>
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8 justify-center">
      {{ range .Params.players }}
      <div class="bg-[#0b0b0f] border border-gray-800 rounded-2xl overflow-hidden hover:border-red-600 transition-colors group shadow-lg flex flex-col">
        <div class="aspect-[3/4] relative overflow-hidden bg-gray-900 flex items-center justify-center">
          <div class="absolute inset-0 bg-[radial-gradient(circle_at_center,rgba(220,38,38,0.1)_0,transparent_70%)] opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
          <img src="{{ .image | default (printf "https://placehold.co/400x500/1a1a24/ffffff?text=%s" (replace .name " " "+")) }}" alt="{{ .name }}" class="w-full h-full object-cover object-top opacity-80 group-hover:opacity-100 group-hover:scale-105 transition-all duration-500">
          <div class="absolute inset-0 bg-gradient-to-t from-black via-black/40 to-transparent"></div>
          
          <div class="absolute bottom-5 left-5 right-5">
            <h3 class="text-2xl font-black text-white leading-none transform group-hover:-translate-y-1 transition-transform">{{ .name }}</h3>
            <p class="text-red-500 font-bold text-xs uppercase tracking-wider mt-1">{{ .role }}</p>
          </div>
        </div>
      </div>
      {{ end }}
    </div>
  </section>
  {{ end }}

  <!-- COACHING STAFF SECTION -->
  {{ if .Params.staff }}
  <section class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 mb-20" data-aos="fade-up" data-aos-delay="300">
    <h2 class="text-3xl font-black mb-10 text-center uppercase tracking-wider flex justify-center items-center gap-4">
      Coaching <span class="text-red-600">Staff</span>
    </h2>
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8 justify-center">
      {{ range .Params.staff }}
      <div class="bg-[#0b0b0f] border border-gray-800 rounded-2xl overflow-hidden hover:border-red-600 transition-colors group opacity-90 hover:opacity-100 flex flex-col">
        <div class="aspect-[3/4] relative overflow-hidden bg-gray-900">
          <img src="{{ .image | default (printf "https://placehold.co/400x500/1a1a24/ffffff?text=%s" (replace .name " " "+")) }}" alt="{{ .name }}" class="w-full h-full object-cover object-top opacity-70 group-hover:opacity-100 transition-all duration-500 grayscale group-hover:grayscale-0 group-hover:scale-105">
          <div class="absolute inset-0 bg-gradient-to-t from-black via-black/50 to-transparent"></div>
          
          <div class="absolute bottom-5 left-5 right-5">
            <h3 class="text-2xl font-black text-white leading-none">{{ .name }}</h3>
            <p class="text-gray-400 font-bold text-xs uppercase tracking-wider mt-1">{{ .role }}</p>
          </div>
        </div>
      </div>
      {{ end }}
    </div>
  </section>
  {{ end }}

</div>
{{ end }}
