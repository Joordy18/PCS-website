{{ define "main" }}
<div class="bg-black min-h-screen text-white pt-20 pb-20">
  
  <article class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-10 relative">
    <a href="/news/" class="inline-flex items-center gap-2 text-gray-400 hover:text-red-500 transition-colors font-bold mb-8 group">
      <i data-lucide="arrow-left" class="w-5 h-5 group-hover:-translate-x-1 transition-transform"></i>
      Retour aux actualités
    </a>

    <header class="mb-12">
      <div class="flex items-center gap-3 text-red-500 font-bold uppercase tracking-widest text-sm mb-4">
        <i data-lucide="calendar" class="w-4 h-4"></i>
        <time datetime="{{ .Date.Format "2006-01-02T15:04:05Z07:00" }}">{{ .Date.Format "02 Jan 2006" }}</time>
      </div>
      <h1 class="text-4xl md:text-5xl lg:text-6xl font-black mb-8 leading-tight">{{ .Title }}</h1>
      {{ if .Params.image }}
      <div class="w-full aspect-video rounded-2xl overflow-hidden shadow-2xl shadow-red-900/10 border border-gray-800">
        <img src="{{ .Params.image }}" alt="{{ .Title }}" class="w-full h-full object-cover">
      </div>
      {{ end }}
    </header>

    <div class="prose prose-invert prose-red max-w-none prose-lg prose-headings:font-black prose-p:text-gray-300 prose-a:text-red-500 hover:prose-a:text-red-400 prose-img:rounded-xl leading-relaxed">
      {{ .Content }}
    </div>

    {{ if ne .Params.comments_enabled false }}
      {{ partial "comments.html" . }}
    {{ end }}

  </article>

</div>

<style>
/* Fallback typography for markdown elements just in case tailwindcss/typography isn't installed */
.prose-invert h1 { font-size: 2.5rem; margin-top: 2rem; margin-bottom: 1rem; color: #fff; }
.prose-invert h2 { font-size: 2rem; margin-top: 2rem; margin-bottom: 1rem; color: #fff; }
.prose-invert h3 { font-size: 1.5rem; margin-top: 1.5rem; margin-bottom: 0.75rem; color: #fff; }
.prose-invert p { margin-bottom: 1.5rem; }
.prose-invert ul { list-style-type: disc; padding-left: 1.5rem; margin-bottom: 1.5rem; }
.prose-invert ol { list-style-type: decimal; padding-left: 1.5rem; margin-bottom: 1.5rem; }
.prose-invert blockquote { border-left: 4px solid #dc2626; padding-left: 1rem; font-style: italic; color: #9ca3af; margin-bottom: 1.5rem; }
.prose-invert img { margin: 2rem auto; }
</style>
{{ end }}
