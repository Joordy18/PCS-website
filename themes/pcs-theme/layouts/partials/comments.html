<section class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 mt-32 pt-20 border-t border-gray-900"
         x-data="{ 
            comments: [], 
            commentCount: 0,
            loading: true, 
            nickname: '', 
            email: '', 
            content: '', 
            success: false,
            error: null,
            async fetchComments() {
              try {
                const res = await fetch(`https://cusdis.com/api/open/comments?appId=462abefd-2d1e-4ef9-a19d-dc8f94a8332b&pageId={{ .File.UniqueID }}`);
                const data = await res.json();
                this.comments = data.data.data || [];
                this.commentCount = data.data.commentCount || 0;
                this.loading = false;
              } catch (e) {
                console.error('Fetch error:', e);
                this.loading = false;
              }
            },
            async postComment() {
              if (!this.nickname || !this.content) return;
              this.error = null;
              try {
                const res = await fetch('https://cusdis.com/api/open/comments', {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({
                    appId: '462abefd-2d1e-4ef9-a19d-dc8f94a8332b',
                    pageId: '{{ .File.UniqueID }}',
                    nickname: this.nickname,
                    email: this.email,
                    content: this.content
                  })
                });
                if (res.ok) {
                  this.success = true;
                  this.content = '';
                  // Refresh comments (might take a moment to appear depending on moderation settings)
                  this.fetchComments();
                } else {
                  this.error = 'Erreur lors de l\'envoi. Veuillez réessayer.';
                }
              } catch (e) {
                this.error = 'Une erreur est survenue.';
              }
            }
         }"
         x-init="fetchComments()">
  
  <div class="flex items-center gap-4 mb-16">
    <div class="h-1 w-12 bg-red-600"></div>
    <h3 class="text-4xl font-black text-white uppercase tracking-tighter italic">Espace Commentaires</h3>
  </div>

  <div class="grid grid-cols-1 gap-16">
    <!-- Formulaire de Commentaire -->
    <div class="bg-gray-900/20 backdrop-blur-sm border border-gray-800/50 rounded-2xl p-8 shadow-2xl">
      <h4 class="text-xl font-bold text-white mb-8 flex items-center gap-3">
        <i data-lucide="message-square" class="w-6 h-6 text-red-600 font-bold"></i>
        LAISSER UN COMMENTAIRE
      </h4>
      
      <form @submit.prevent="postComment" class="space-y-6">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <input type="text" x-model="nickname" required placeholder="Pseudo *" 
                 class="w-full px-6 py-4 bg-gray-950 border border-gray-800 rounded-lg text-white placeholder-gray-500 focus:outline-none focus:border-red-600 transition-all duration-300">
          <input type="email" x-model="email" placeholder="Email (optionnel)" 
                 class="w-full px-6 py-4 bg-gray-950 border border-gray-800 rounded-lg text-white placeholder-gray-500 focus:outline-none focus:border-red-600 transition-all duration-300">
        </div>
        <textarea x-model="content" required placeholder="Votre message... *" rows="4"
                  class="w-full px-6 py-4 bg-gray-950 border border-gray-800 rounded-lg text-white placeholder-gray-500 focus:outline-none focus:border-red-600 transition-all duration-300 resize-none"></textarea>
        
        <div class="flex flex-col gap-4">
          <button type="submit" 
                  class="w-full md:w-max px-12 py-4 bg-red-600 text-white font-black text-lg rounded-lg hover:bg-red-700 transition-all duration-300 transform hover:-translate-y-1 shadow-lg shadow-red-900/20 uppercase italic tracking-tighter">
            Publier le commentaire
          </button>
          <p x-show="success" x-cloak class="text-green-500 font-bold flex items-center gap-2">
            <i data-lucide="check-circle" class="w-5 h-5"></i> Commentaire envoyé avec succès !
          </p>
          <p x-show="error" x-cloak class="text-red-500 font-bold" x-text="error"></p>
        </div>
      </form>
    </div>

    <!-- Liste des Commentaires -->
    <div class="space-y-10">
      <h4 class="text-2xl font-black text-white flex items-center gap-3 uppercase italic tracking-widest">
        Derniers messages
        <span class="text-sm bg-gray-800 text-gray-400 px-3 py-1 rounded-full font-bold ml-2" x-text="commentCount"></span>
      </h4>

      <template x-if="loading">
        <div class="flex justify-center py-10">
          <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-red-600"></div>
        </div>
      </template>

      <div class="space-y-8">
        <template x-for="comment in comments" :key="comment.id">
          <div class="group">
            <div class="flex items-start gap-4 p-6 rounded-2xl border border-transparent hover:border-gray-800 hover:bg-gray-900/10 transition-all duration-300">
              <div class="w-12 h-12 rounded-full bg-red-600/10 border border-red-600 flex items-center justify-center text-red-600 font-black text-xl flex-shrink-0" x-text="(comment.by_nickname || 'A').charAt(0).toUpperCase()"></div>
              <div class="flex-grow">
                <div class="flex items-center justify-between mb-2">
                  <h5 class="text-lg font-bold text-white uppercase tracking-tight" x-text="comment.by_nickname || 'Anonyme'"></h5>
                  <span class="text-xs text-gray-500 font-medium" x-text="comment.createdAt ? new Date(comment.createdAt).toLocaleDateString('fr-FR', { day: 'numeric', month: 'long', year: 'numeric' }) : ''"></span>
                </div>
                <p class="text-gray-400 leading-relaxed" x-text="comment.content"></p>
              </div>
            </div>
          </div>
        </template>
        
        <template x-if="!loading && comments.length === 0">
          <div class="text-center py-20 bg-gray-900/10 rounded-3xl border border-dashed border-gray-800">
            <i data-lucide="message-circle" class="w-16 h-16 text-gray-700 mx-auto mb-4"></i>
            <p class="text-gray-500 text-xl font-medium">Soyez le premier à commenter cet article !</p>
          </div>
        </template>
      </div>
    </div>
  </div>
</section>
