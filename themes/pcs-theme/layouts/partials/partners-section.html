{{ $bannerPartners := where (where .Site.RegularPages "Type" "partenaires") "Params.show_in_banner" true }}
{{ if gt (len $bannerPartners) 0 }}
<section id="partners" class="py-10 bg-black overflow-hidden border-t border-b border-gray-900">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 mb-8">
    <div data-aos="fade-up" data-aos-duration="600" class="text-center">
      <h2 class="text-xl font-bold text-gray-500 uppercase tracking-widest">ILS NOUS FONT CONFIANCE</h2>
    </div>
  </div>

  <div class="relative w-full overflow-hidden flex items-center h-24">
    <div class="animate-marquee gap-16 md:gap-32">
      <!-- Set 1 -->
      <div class="flex items-center gap-16 md:gap-32 px-8">
        {{ range $bannerPartners }}
        <a href="/partenaires/#{{ .File.TranslationBaseName }}"
          class="text-3xl md:text-5xl font-black text-gray-700 hover:text-red-600 transition-colors duration-300 whitespace-nowrap cursor-pointer block">
          {{ .Title | upper }}
        </a>
        {{ end }}
      </div>
      <!-- Set 2 -->
      <div class="flex items-center gap-16 md:gap-32 px-8">
        {{ range $bannerPartners }}
        <a href="/partenaires/#{{ .File.TranslationBaseName }}"
          class="text-3xl md:text-5xl font-black text-gray-700 hover:text-red-600 transition-colors duration-300 whitespace-nowrap cursor-pointer block">
          {{ .Title | upper }}
        </a>
        {{ end }}
      </div>
    </div>
  </div>
</section>
{{ end }}
