<section id="contact" class="py-24 bg-gray-950">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div data-aos="fade-up" data-aos-duration="600" class="mb-16">
      <h2 class="text-5xl sm:text-6xl font-black text-white mb-4">CONTACTEZ NOUS</h2>
      <div class="h-1 w-24 bg-red-600 mb-6"></div>
      <p class="text-xl text-gray-400 max-w-2xl mt-6">Vous avez un projet? Vous êtes curieux? Contactez-nous!</p>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-12">
      <!-- Contact Info -->
      <div data-aos="fade-right" data-aos-duration="600" class="space-y-6">
        <h3 class="text-3xl font-black text-white mb-8">MOYENS DE CONTACT</h3>

        <div
          class="flex items-start gap-4 p-6 bg-black border border-gray-800 rounded-lg hover:border-red-600 transition-all duration-300">
          <div class="p-3 bg-red-600 rounded">
            <i data-lucide="mail" class="text-white" width="24" height="24"></i>
          </div>
          <div x-data="{ user: 'contact', domain: 'project-conquerors.com' }">
            <h4 class="font-bold text-white mb-1">Email</h4>
            <a :href="'mailto:' + user + '@' + domain" class="text-gray-400 hover:text-red-500 transition-colors inline-block" x-text="user + '@' + domain"></a>
          </div>
        </div>

        <div
          class="flex items-start gap-4 p-6 bg-black border border-gray-800 rounded-lg hover:border-red-600 transition-all duration-300">
          <div class="p-3 bg-red-600 rounded">
            <i data-lucide="phone" class="text-white" width="24" height="24"></i>
          </div>
          <div>
            <h4 class="font-bold text-white mb-1">Téléphone</h4>
            <p class="text-gray-400">+33 1 23 45 67 89</p>
          </div>
        </div>

        <div
          class="flex items-start gap-4 p-6 bg-black border border-gray-800 rounded-lg hover:border-red-600 transition-all duration-300">
          <div class="p-3 bg-red-600 rounded">
            <i data-lucide="map-pin" class="text-white" width="24" height="24"></i>
          </div>
          <div>
            <h4 class="font-bold text-white mb-1">Adresse</h4>
            <p class="text-gray-400">Paris, France</p>
          </div>
        </div>
      </div>

      <!-- Contact Form -->
      <div data-aos="fade-left" data-aos-duration="600" class="bg-black border border-gray-800 rounded-lg p-8">
        <h3 class="text-3xl font-black text-white mb-8">ENVOYEZ UN MESSAGE</h3>
        <form class="space-y-6">
          <div>
            <input type="text" placeholder="Nom"
              class="w-full px-6 py-4 bg-gray-900 border border-gray-800 rounded text-white placeholder-gray-500 focus:outline-none focus:border-red-600 transition-colors duration-300" />
          </div>
          <div>
            <input type="email" placeholder="Email"
              class="w-full px-6 py-4 bg-gray-900 border border-gray-800 rounded text-white placeholder-gray-500 focus:outline-none focus:border-red-600 transition-colors duration-300" />
          </div>
          <div>
            <textarea rows="5" placeholder="Message"
              class="w-full px-6 py-4 bg-gray-900 border border-gray-800 rounded text-white placeholder-gray-500 focus:outline-none focus:border-red-600 transition-colors duration-300 resize-none"></textarea>
          </div>
          <button type="button"
            class="w-full px-8 py-5 bg-red-600 text-white font-bold text-lg rounded hover:bg-red-700 transition-colors duration-300">
            ENVOYER
          </button>
        </form>
      </div>
    </div>
  </div>
</section>
