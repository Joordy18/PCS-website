<section id="contact" class="py-24 bg-gray-950">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div data-aos="fade-up" data-aos-duration="600" class="mb-16">
      <h2 class="text-5xl sm:text-6xl font-black text-white mb-4">CONTACTEZ NOUS</h2>
      <div class="h-1 w-24 bg-red-600 mb-6"></div>
      <p class="text-xl text-gray-400 max-w-2xl mt-6">Vous avez un projet? Vous êtes curieux? Contactez-nous!</p>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-12 items-center">
      <!-- Contact Banner / Image -->
      <div data-aos="fade-right" data-aos-duration="600" class="relative group h-full min-h-[400px]">
        <div
          class="absolute inset-0 bg-red-600/20 rounded-xl blur-2xl group-hover:bg-red-600/30 transition-all duration-700">
        </div>
        <div class="relative h-full rounded-xl overflow-hidden border border-gray-800 shadow-2xl">
          <img src="/images/test1.jpeg" alt="Contact Project Conquerors"
            class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-1000 opacity-80 group-hover:opacity-100">
          <div class="absolute inset-0 bg-gradient-to-t from-black via-transparent to-transparent"></div>
          <div class="absolute bottom-10 left-10">
            <h3 class="text-3xl font-black text-white mb-2 uppercase italic tracking-tighter">On reste en contact ?</h3>
            <p class="text-gray-400 font-medium">Rejoignez l'aventure PCS sur nos réseaux.</p>
          </div>
        </div>
      </div>

      <!-- Contact Form & Direct Link -->
      <div data-aos="fade-left" data-aos-duration="600" class="space-y-8">
        <div class="bg-black/40 backdrop-blur-sm border border-gray-800 rounded-xl p-8 shadow-2xl">
          <h3 class="text-3xl font-black text-white mb-8 border-b border-red-600/30 pb-4">ENVOYEZ UN MESSAGE</h3>
          <form class="space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
              <input type="text" placeholder="Nom"
                class="w-full px-6 py-4 bg-gray-900/50 border border-gray-800 rounded text-white placeholder-gray-500 focus:outline-none focus:border-red-600 transition-colors duration-300" />
              <input type="email" placeholder="Email"
                class="w-full px-6 py-4 bg-gray-900/50 border border-gray-800 rounded text-white placeholder-gray-500 focus:outline-none focus:border-red-600 transition-colors duration-300" />
            </div>
            <div>
              <textarea rows="4" placeholder="Message"
                class="w-full px-6 py-4 bg-gray-900/50 border border-gray-800 rounded text-white placeholder-gray-500 focus:outline-none focus:border-red-600 transition-colors duration-300 resize-none"></textarea>
            </div>
            <button type="button"
              class="w-full px-8 py-4 bg-red-600 text-white font-bold text-lg rounded hover:bg-red-700 transition-all duration-300 transform hover:-translate-y-1 shadow-[0_10px_20px_-10px_rgba(220,38,38,0.5)]">
              ENVOYER LE MESSAGE
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>
</section>
